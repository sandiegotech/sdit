name: Checks
on: [push, pull_request]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml markdown pytest

      - name: Validate catalog
        run: python scripts/validate.py

      - name: Unit tests
        run: pytest -q scripts/tests

      - name: Built site is committed (no drift)
        run: |
          python scripts/build_site.py --out .
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Committed site is out of date. Run 'python3 scripts/build_site.py --out .' and commit the result."
            git --no-pager diff --stat
            exit 1
          fi
