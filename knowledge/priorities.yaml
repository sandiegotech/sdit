__meta__:
  title: The Standing Order of Operations
  description: The founding sequence from the SDIT Bible §VIII — in order, in public, with proof at each step.
  intended_use: The execution list. Do these in order; resist reordering.
standing_order:
  - step: 1
    action: Begin Perspectives
    detail: Commission and produce the first five lessons — they can be made anywhere, now. The institution becomes real the day the first one is published.
  - step: 2
    action: Write the dual-register catalog
    detail: Take institute/the-degree.md to catalog grade — one artifact serving BPPE core, WSCUC core, and recruiting pitch.
  - step: 3
    action: Seat the board
    detail: Genuinely independent; include at least one member who has been through a WSCUC process.
  - step: 4
    action: Run Project One
    detail: Two-week summer intensive — one Double Feature seminar, one ocean-physics module, one board build, filmed by participants, public exhibition. Twelve people. No degree claims.
  - step: 5
    action: File BPPE
    detail: Then the long road, in public, with proof at every step.
