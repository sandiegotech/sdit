__meta__:
  title: Programs
  description: The three layers of an SDIT education.
  intended_use: Source for Programs pages and cross-linking; IDs must remain stable.
programs:
  - id: perspectives
    layer: 1
    name: Perspectives
    status: live via The Daily (sandiegotech.org/daily.html); standalone lessons in production
    description: >
      Short, free, standalone lessons — hour-long lectures and films, each
      complete in itself, made for people who will never enroll. The public
      face, the content engine, the recruiting funnel, and the legal head start.
      The Daily, the weekday newsletter, lives on the main site.
  - id: intensives
    layer: 2
    name: Intensives
    status: planned — Project One is the founding pilot
    description: >
      Short paid non-degree programs: a two-week summer intensive, weekend
      workshops, a single Canon seminar with a build project. Small and real.
  - id: bat
    layer: 3
    name: Bachelor of Arts in Technology
    status: working framework — see curriculum/index.html and institute/the-degree.md
    description: >
      The degree. 120 semester units, 8 semesters, one program. Years 1-2 are
      the Foundation, identical for every student — a common language and
      framework. At the end of Year 2 each student declares a concentration,
      chosen from experience: Media (things people watch, hear, and feel),
      Design (things people use), or Engineering (things that work on their
      own). Four depth studios in the concentration plus the Crossing — one
      studio from outside it, required. Field Term, defended capstone,
      Physical Culture throughout.
    path: curriculum/index.html

