<header class="masthead masthead--learn">
  <div class="frame masthead-inner">
    <a href="/index.html" class="wordmark"><img class="masthead-crest" src="/assets/brand/sdit-shield-gold.svg" alt="" width="36" height="36" /><span>San Diego Institute of Technology<small>The Curriculum</small></span></a>
    <button class="hamburger" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
    <nav class="toc" aria-label="Site">
      <a data-nav="curriculum" href="/curriculum/index.html">Curriculum</a>
      <a data-nav="courses" href="/courses/index.html">Courses</a>
      <a data-nav="schedule" href="/curriculum/schedule.html">Schedule</a>
      <a id="masthead-resume" class="toc-resume" href="#" hidden></a>
    </nav>
  </div>
</header>
<script>
  (function () {
    var btn = document.querySelector('.masthead .hamburger');
    if (!btn || btn.dataset.bound === 'true') return;
    btn.dataset.bound = 'true';
    btn.addEventListener('click', function () {
      var open = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!open));
      document.querySelector('.masthead .toc').classList.toggle('is-open');
    });
  })();
</script>
<script src="/assets/js/layout.js" defer></script>
<script src="/assets/js/student-work.js" defer></script>
<script src="/assets/js/resume.js" defer></script>
